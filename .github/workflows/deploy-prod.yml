name: Deploy Production

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: 8.0.x
  ASPNETCORE_ENVIRONMENT: Production
  
  TMDB__ApiKey: ${{ secrets.TMDB__APIKEY }}
  TMDB__BearerToken: ${{ secrets.TMDB__BEARERTOKEN }}
  WATCHMODE__ApiKey: ${{ secrets.WATCHMODE__APIKEY }}
  RESEND__ApiKey: ${{ secrets.RESEND__APIKEY }}
  CONNECTIONSTRINGS__SUPABASEDB: ${{ secrets.CONNECTIONSTRINGS__SUPABASEDB }}
  LOGTAIL__ApiKey: ${{ secrets.LOGTAIL__APIKEY }}


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./lumires.Composition/lumires.Composition.csproj -c Release -o ./publish --no-build

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Configure SSH
        env:
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<EOF
          Host ssh.supabase.win
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${CF_ID} --service-token-secret ${CF_SECRET}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Pull & restart on VM
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'cd ~/lumires && docker compose pull && docker compose up -d && docker image prune -f'
